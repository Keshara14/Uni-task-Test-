{% extends "base.html" %}

{% block title %}Login - Unitask{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="login-card">
                    <div class="row g-0">
                        <!-- Left Side - Branding -->
                         <div class="col-lg-6 login-left">
                         <!-- Everything inside is removed to clear the text -->
                         </div>
                        <!-- Right Side - Login Form -->
                        <div class="col-lg-6 login-right">
                            <h3>Welcome Back</h3>
                            <p class="welcome-text">Login to access your dashboard</p>
                            
                            {% if error %}
                            <div class="alert alert-danger">
                                <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
                            </div>
                            {% endif %}
                            
                            <form method="POST" action="{{ url_for('login') }}">
                                <div class="mb-3">
                                    <label for="username" class="form-label">Username or Email</label>
                                    <input type="text" class="form-control" id="username" name="username" 
                                           placeholder="Enter your username or email" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="Enter your password" required>
                                </div>
                                
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="remember">
                                        <label class="form-check-label" for="remember">
                                           
                                        </label>
                                    </div>
                                    <a href="#" class="forgot-link"></a>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-sign-in-alt me-2"></i> Login
                                </button>
                            </form>
                            
                            <div class="text-center mt-4">
                                <p class="text-muted">
                                    Don't have an account? 
                                    <a href="{{ url_for('signup') }}" class="text-primary fw-bold">Sign up here</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
